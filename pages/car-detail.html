<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>車輛資訊</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <div class="container">
    <div id="detailBox"></div>

    <br>

    <button id="editCarBtn">
      ✏️ 編輯車團
    </button>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="/firebase/firebase.js?v=25"></script>
  <script src="/js/seat.js?v=1"></script>
  <script src="/js/cardetail.js?v=44"></script>

  <script>
    const params = new URLSearchParams(location.search);
    const carId = params.get("id");

    const editBtn = document.getElementById("editCarBtn");
    if (editBtn && carId) {
      editBtn.onclick = function () {
        location.href = "editcar.html?id=" + carId;
      };
    }
  </script>
</body>
</html>
