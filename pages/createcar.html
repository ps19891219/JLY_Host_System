<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建立新車</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <div class="container">
    <h1>➕ 建立車團</h1>

    <div class="card">
      <label>劇本名稱</label>
      <input id="scriptName" type="text" placeholder="例：草芥">

      <label>日期</label>
      <input id="gameDate" type="date">

      <label>時間</label>
      <input id="gameTime" type="time">

      <label>地點</label>
      <input id="locationName" type="text" placeholder="例：糖醋魚工作室">

      <label>開團單位 / 工作室</label>
      <input id="organizerName" type="text" placeholder="例：默默私團">

      <label>DM</label>
      <input id="dmName" type="text" placeholder="可空白，之後會支援多位 DM">

      <label>車資</label>
      <input id="price" type="number" min="0" placeholder="選填">

      <label>備註</label>
      <textarea id="note" placeholder="選填，例如：改動版、新手友善、可反串"></textarea>

      <hr>

      <label>人數配置</label>

      <label class="checkbox-row">
        <input type="radio" name="peopleMode" value="gender" checked onchange="togglePeopleMode()">
        固定男女配置
      </label>

      <label class="checkbox-row">
        <input type="radio" name="peopleMode" value="total" onchange="togglePeopleMode()">
        不限性別
      </label>

      <div id="genderBox">
        <label>男位</label>
        <input id="maleSlots" type="number" min="0" value="3">

        <label>女位</label>
        <input id="femaleSlots" type="number" min="0" value="3">

        <label>不限位</label>
        <input id="flexibleSlots" type="number" min="0" value="0">

        <small>
          不限位可依玩家實際選擇，自動列入男位或女位。
        </small>
      </div>

      <div id="totalBox" style="display:none;">
        <label>總人數</label>
        <input id="totalPeople" type="number" min="1" value="6">
      </div>

      <hr>

      <label>我在這台車的身份</label>

      <label class="checkbox-row">
        <input type="radio" name="myRole" value="host" checked>
        🟢 我是主揪
      </label>

      <label class="checkbox-row">
        <input type="radio" name="myRole" value="player">
        🔵 我是玩家
      </label>

      <label class="checkbox-row">
        <input type="radio" name="myRole" value="favorite">
        ⭐ 我要收藏
      </label>

      <hr>

      <label>車友名單顯示</label>

      <label class="checkbox-row">
        <input type="radio" name="guestListVisibility" value="approved_only" checked>
        核准後可看
      </label>

      <label class="checkbox-row">
        <input type="radio" name="guestListVisibility" value="private">
        不公開
      </label>

      <label class="checkbox-row">
        <input type="radio" name="guestListVisibility" value="public">
        所有人可看
      </label>

      <hr>

      <label>車團公開設定</label>

      <label class="checkbox-row">
        <input type="radio" name="visibility" value="private" checked>
        🔒 私下揪車
      </label>

      <label class="checkbox-row">
        <input type="radio" name="visibility" value="public">
        🌍 公開招募
      </label>

      <button type="button" onclick="createCar()">
        💾 建立車團
      </button>
    </div>

    <button class="gray" onclick="location.href='mycar.html'">
      🚗 返回我的車
    </button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="/firebase/firebase.js?v=41"></script>
<script src="/js/seat.js?v=2"></script>
<script src="/js/createcar.js?v=42"></script>
</body>
</html>
