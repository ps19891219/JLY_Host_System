<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建立新車</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <div class="container">
    <h1>➕ 建立新車</h1>

    <label>劇本名稱</label>
    <input id="scriptName" type="text">

    <label>日期</label>
    <input id="gameDate" type="date">

    <label>時間</label>
    <input id="gameTime" type="time">

    <label>工作室</label>
    <input id="studioName" type="text">

    <label>DM</label>
    <input id="dmName" type="text">

    <label>總人數</label>
    <input id="totalPeople" type="number" value="6">

    <label>男生名額</label>
    <input id="maleSlots" type="number" value="3">

    <label>女生名額</label>
    <input id="femaleSlots" type="number" value="3">

    <label>車資</label>
    <input id="price" type="number" value="0">

    <label class="checkbox-row">
      <input id="isHost" type="checkbox" checked>
      這台車是我主揪
    </label>

    <button type="button" onclick="createCar()">💾 建立車團</button>

    <button class="gray" type="button" onclick="location.href='mycar.html'">
      🚗 返回我的車
    </button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="/firebase/firebase.js?v=15"></script>
  <script src="/js/createcar.js?v=15"></script>
</body>
</html>
